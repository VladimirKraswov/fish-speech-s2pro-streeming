# compose.base.yml
services:
  app-base:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        BACKEND: ${BACKEND:-cuda}
        CUDA_VER: ${CUDA_VER:-12.6.0}
        UV_EXTRA: ${UV_EXTRA:-cu126}
        UV_VERSION: ${UV_VERSION:-0.8.15}
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./references:/app/references
    environment:
      COMPILE: ${COMPILE:-0}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    tty: true
    stdin_open: true
