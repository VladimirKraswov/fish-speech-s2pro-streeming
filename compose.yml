name: fish-speech
services:
  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
      args:
        CUDA_VER: 12.9.0
        UV_EXTRA: cu129
    image: fish-speech-server:latest
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./references:/app/references
      - ./config:/app/config
    environment:
      # COMPILE не задаём, чтобы использовалось значение из runtime.json
      # или явно задаём COMPILE: "1"
      COMPILE: "1"
      BACKEND: cuda
      TORCHINDUCTOR_COMPILE_THREADS: "1"
      TORCHDYNAMO_VERBOSE: "1"
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "8080:8080"
    # Добавляем лимиты памяти и /dev/shm (через docker-compose.override.yml или прямо здесь)
    mem_limit: 64g
    shm_size: 16g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/health"]
      interval: 30s
      timeout: 30s               # увеличиваем таймаут ответа
      retries: 20                # больше попыток
      start_period: 900s         # 15 минут на компиляцию

  proxy:
    build:
      context: .
      dockerfile: docker/Dockerfile.proxy
    image: fish-speech-proxy:latest
    volumes:
      - ./config:/app/config
    ports:
      - "9000:9000"
    environment:
      FISH_UPSTREAM_TTS_URL: http://server:8080/v1/tts
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  webui:
    build:
      context: .
      dockerfile: docker/Dockerfile.webui
    image: fish-speech-webui:latest
    volumes:
      - ./config:/app/config   # если webui использует конфиг
    ports:
      - "9001:9001"
    depends_on:
      proxy:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s