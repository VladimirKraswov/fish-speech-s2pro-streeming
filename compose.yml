name: fish-speech

services:
  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
      args:
        CUDA_VER: 12.8.1
        UBUNTU_VER: 24.04
        UV_EXTRA: cu128
        UV_VERSION: 0.8.15
        PY_VER: 3.12
    image: fish-speech-server:cuda
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./references:/app/references
      - ./config:/app/config
      - ./.torchinductor:/app/.torchinductor
    environment:
      COMPILE: "1"
      BACKEND: cuda
      API_SERVER_NAME: 0.0.0.0
      API_SERVER_PORT: "8080"
      LLAMA_CHECKPOINT_PATH: /app/checkpoints/fs-1.2-int8-s2-pro-int8
      DECODER_CHECKPOINT_PATH: /app/checkpoints/s2-pro/codec.pth
      DECODER_CONFIG_NAME: modded_dac_vq
      TORCHINDUCTOR_CACHE_DIR: /app/.torchinductor
      TORCHINDUCTOR_COMPILE_THREADS: "1"
      CUDA_MODULE_LOADING: LAZY
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "8080:8080"
    mem_limit: 64g
    shm_size: 16g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/health"]
      interval: 30s
      timeout: 30s
      retries: 30
      start_period: 1800s

  proxy:
    build:
      context: .
      dockerfile: docker/Dockerfile.proxy
    image: fish-speech-proxy:latest
    volumes:
      - ./config:/app/config
    ports:
      - "9000:9000"
    environment:
      FISH_UPSTREAM_TTS_URL: http://server:8080/v1/tts
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  webui:
    build:
      context: .
      dockerfile: docker/Dockerfile.webui
    image: fish-speech-webui:latest
    volumes:
      - ./config:/app/config
    ports:
      - "9001:9001"
    depends_on:
      proxy:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s