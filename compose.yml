name: fish-speech

services:
  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
      args:
        CUDA_VER: 12.8.1
        UV_EXTRA: cu128
    image: fish-speech-server:latest
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./references:/app/references
      - ./config:/app/config
      - ./.torchinductor:/app/.torchinductor
    environment:
      COMPILE: "1"
      BACKEND: cuda
      TORCHINDUCTOR_CACHE_DIR: /app/.torchinductor
      TORCHINDUCTOR_COMPILE_THREADS: "1"
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
      CUDA_MODULE_LOADING: LAZY
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "8080:8080"
    mem_limit: 64g
    shm_size: 16g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/health"]
      interval: 30s
      timeout: 30s
      retries: 30
      start_period: 1800s

  proxy:
    build:
      context: .
      dockerfile: docker/Dockerfile.proxy
    image: fish-speech-proxy:latest
    volumes:
      - ./config:/app/config
    ports:
      - "9000:9000"
    environment:
      FISH_UPSTREAM_TTS_URL: http://server:8080/v1/tts
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  webui:
    build:
      context: .
      dockerfile: docker/Dockerfile.webui
    image: fish-speech-webui:latest
    volumes:
      - ./config:/app/config
    ports:
      - "9001:9001"
    depends_on:
      proxy:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s