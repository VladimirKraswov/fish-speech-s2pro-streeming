# compose.yml
name: fish-speech

services:
  webui:
    extends:
      file: compose.base.yml
      service: app-base
    build:
      target: webui
    environment:
      COMPILE: ${COMPILE:-0}
    profiles: ["webui"]
    ports:
      - "${GRADIO_PORT:-7860}:7860"

  server:
    extends:
      file: compose.base.yml
      service: app-base
    build:
      target: server
    environment:
      COMPILE: ${COMPILE:-0}
    profiles: ["server", "full-stack"]
    ports:
      - "${API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  proxy:
    extends:
      file: compose.base.yml
      service: app-base
    build:
      target: proxy
    environment:
      FISH_UPSTREAM_TTS_URL: http://server:8080/v1/tts
    depends_on:
      server:
        condition: service_healthy
    profiles: ["proxy", "full-stack"]
    ports:
      - "${PROXY_PORT:-9000}:9000"

  web-ui:
    extends:
      file: compose.base.yml
      service: app-base
    build:
      target: webui-preact
    depends_on:
      proxy:
        condition: service_started
    profiles: ["web-ui", "full-stack"]
    ports:
      - "${WEBUI_PORT:-9001}:9001"
