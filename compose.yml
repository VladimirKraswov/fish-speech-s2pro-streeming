# compose.yml
name: fish-speech

services:
  server:
    extends:
      file: compose.base.yml
      service: app-base
    build:
      target: server
    environment:
      COMPILE: ${COMPILE:-0}
    profiles: ["server", "full-stack"]
    ports:
      - "${API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/health"]
      interval: 15s
      timeout: 10s
      retries: 20  # Give model plenty of time to load (300s total)
      start_period: 30s

  proxy:
    extends:
      file: compose.base.yml
      service: app-base
    build:
      target: proxy
    environment:
      FISH_UPSTREAM_TTS_URL: http://server:8080/v1/tts
    depends_on:
      server:
        condition: service_healthy
    profiles: ["proxy", "full-stack"]
    ports:
      - "${PROXY_PORT:-9000}:9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  web-ui:
    extends:
      file: compose.base.yml
      service: app-base
    build:
      target: webui-preact
    depends_on:
      proxy:
        condition: service_healthy
    profiles: ["web-ui", "full-stack"]
    ports:
      - "${WEBUI_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
