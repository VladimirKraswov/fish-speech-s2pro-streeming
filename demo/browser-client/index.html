<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Proxy PCM Stream Client</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #fff;
      --line: #d8dfef;
      --text: #182131;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --danger: #b91c1c;
      --danger-soft: #fee2e2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: linear-gradient(180deg, #fcfdff 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "SF Pro Display", "Segoe UI", system-ui, sans-serif;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 16px 48px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    p {
      color: var(--muted);
      line-height: 1.5;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    input,
    textarea,
    button {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      font: inherit;
      padding: 12px 14px;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    button {
      width: auto;
      min-width: 140px;
      cursor: pointer;
      font-weight: 650;
      background: var(--accent-soft);
      color: var(--accent);
    }

    button.stop {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .status {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .status-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fbfcff;
    }

    .status-card .label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .status-card .value {
      display: block;
      font-size: 16px;
      font-weight: 700;
    }

    .log {
      margin: 0;
      min-height: 220px;
      max-height: 320px;
      overflow: auto;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #0f172a;
      color: #e2e8f0;
      padding: 14px;
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 720px) {
      .status {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Proxy PCM Stream Client</h1>
    <p>Минимальный прямой тест proxy path: текст, одна кнопка запуска, один playback path через AudioWorklet.</p>

    <section class="panel">
      <label for="proxyBaseUrl">Proxy base URL</label>
      <input id="proxyBaseUrl" value="http://192.168.31.32:9000" />
      <label for="sourceText" style="margin-top: 14px;">Text</label>
      <textarea id="sourceText">Сегодня утром я решил пройтись по улице. Проверка нужна, чтобы убедиться, что потоковое воспроизведение остаётся непрерывным и разборчивым.</textarea>
      <div class="actions">
        <button id="playBtn">Play</button>
        <button id="stopBtn" class="stop">Stop</button>
      </div>
    </section>

    <section class="panel">
      <div class="status">
        <div class="status-card">
          <span class="label">State</span>
          <span class="value" id="statusState">idle</span>
        </div>
        <div class="status-card">
          <span class="label">TTFA</span>
          <span class="value" id="statusTtfa">—</span>
        </div>
        <div class="status-card">
          <span class="label">Queued audio</span>
          <span class="value" id="statusQueue">0.000 s</span>
        </div>
        <div class="status-card">
          <span class="label">Underruns</span>
          <span class="value" id="statusUnderruns">0</span>
        </div>
      </div>
    </section>

    <section class="panel">
      <pre id="logView" class="log"></pre>
    </section>
  </main>

  <script>
    const els = {
      proxyBaseUrl: document.getElementById("proxyBaseUrl"),
      sourceText: document.getElementById("sourceText"),
      playBtn: document.getElementById("playBtn"),
      stopBtn: document.getElementById("stopBtn"),
      statusState: document.getElementById("statusState"),
      statusTtfa: document.getElementById("statusTtfa"),
      statusQueue: document.getElementById("statusQueue"),
      statusUnderruns: document.getElementById("statusUnderruns"),
      logView: document.getElementById("logView"),
    };

    const playbackState = {
      queuedSamples: 0,
      contextSampleRate: 0,
      underruns: 0,
      firstAudioAtMs: null,
      clickAtMs: null,
      pendingPcmRemainder: new Uint8Array(0),
    };

    const state = {
      audioCtx: null,
      gainNode: null,
      worklet: null,
      workletBlobUrl: null,
      abortController: null,
      streamMeta: null,
      currentRunId: 0,
      logLines: [],
    };

    function log(message) {
      const line = `[${new Date().toLocaleTimeString()}] ${message}`;
      state.logLines.push(line);
      if (state.logLines.length > 200) {
        state.logLines = state.logLines.slice(-200);
      }
      els.logView.textContent = state.logLines.join("\n");
      els.logView.scrollTop = els.logView.scrollHeight;
      console.log(line);
    }

    function renderStatus() {
      const queuedSec = playbackState.contextSampleRate
        ? playbackState.queuedSamples / playbackState.contextSampleRate
        : 0;
      els.statusQueue.textContent = `${queuedSec.toFixed(3)} s`;
      els.statusUnderruns.textContent = String(playbackState.underruns);
      els.statusTtfa.textContent = playbackState.firstAudioAtMs && playbackState.clickAtMs
        ? `${Math.round(playbackState.firstAudioAtMs - playbackState.clickAtMs)} ms`
        : "—";
    }

    function renderDebugPanel() {
      renderStatus();
    }

    function concatUint8Arrays(parts) {
      const chunks = parts.filter((part) => part && part.length);
      const total = chunks.reduce((sum, part) => sum + part.length, 0);
      const out = new Uint8Array(total);
      let offset = 0;
      for (const part of chunks) {
        out.set(part, offset);
        offset += part.length;
      }
      return out;
    }

    function setStateLabel(value) {
      els.statusState.textContent = value;
    }

    function pcm16ToMonoFloat32(arrayBuffer, channels) {
      const bytes = new Uint8Array(arrayBuffer);
      const view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
      const frameCount = Math.floor(bytes.byteLength / Math.max(1, channels) / 2);
      const out = new Float32Array(frameCount);
      for (let frame = 0; frame < frameCount; frame += 1) {
        let acc = 0;
        for (let ch = 0; ch < channels; ch += 1) {
          acc += view.getInt16((frame * channels + ch) * 2, true) / 32768;
        }
        out[frame] = Math.max(-1, Math.min(1, acc / Math.max(1, channels)));
      }
      return out;
    }

    function resampleCubic(input, fromRate, toRate) {
      if (!input.length || fromRate === toRate) return input;
      const ratio = fromRate / toRate;
      const outLength = Math.max(1, Math.round(input.length / ratio));
      const out = new Float32Array(outLength);
      for (let i = 0; i < outLength; i += 1) {
        const sourcePos = i * ratio;
        const x1 = Math.floor(sourcePos);
        const x0 = Math.max(0, x1 - 1);
        const x2 = Math.min(input.length - 1, x1 + 1);
        const x3 = Math.min(input.length - 1, x1 + 2);
        const t = sourcePos - x1;
        const t2 = t * t;
        const t3 = t2 * t;
        const a0 = input[x3] - input[x2] - input[x0] + input[x1];
        const a1 = input[x0] - input[x1] - a0;
        const a2 = input[x2] - input[x0];
        const a3 = input[x1];
        out[i] = Math.max(-1, Math.min(1, a0 * t3 + a1 * t2 + a2 * t + a3));
      }
      return out;
    }

    function recordQueueDepth(samples) {
      playbackState.queuedSamples = samples;
      renderDebugPanel();
    }

    async function ensureAudio() {
      const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextCtor) {
        throw new Error("Web Audio API is not available");
      }

      if (!state.audioCtx) {
        state.audioCtx = new AudioContextCtor({
          latencyHint: "interactive",
          sampleRate: 44100,
        });
        playbackState.contextSampleRate = state.audioCtx.sampleRate;
        log(`audio_context sample_rate=${state.audioCtx.sampleRate}`);
      }

      if (!state.gainNode) {
        state.gainNode = state.audioCtx.createGain();
        state.gainNode.gain.value = 1.0;
        state.gainNode.connect(state.audioCtx.destination);
      }

      if (!state.worklet) {
        const workletCode = `
          class PCMPlayerWorklet extends AudioWorkletProcessor {
            constructor() {
              super();
              this.queue = [];
              this.current = null;
              this.offset = 0;
              this.queuedSamples = 0;
              this.expectMore = false;
              this.prebufferSamples = Math.round(sampleRate * 0.18);
              this.prebuffering = true;
              this.started = false;
              this.lastStatsAt = -1;
              this.port.onmessage = (event) => {
                const data = event.data || {};
                if (data.type === "push" && data.payload) {
                  this.queue.push(data.payload);
                  this.queuedSamples += data.payload.length;
                } else if (data.type === "expect_more") {
                  this.expectMore = !!data.value;
                } else if (data.type === "reset") {
                  this.queue = [];
                  this.current = null;
                  this.offset = 0;
                  this.queuedSamples = 0;
                  this.expectMore = false;
                  this.prebuffering = true;
                  this.started = false;
                }
              };
            }
            postStats(force = false) {
              if (!force && this.lastStatsAt >= 0 && currentTime - this.lastStatsAt < 0.1) return;
              this.lastStatsAt = currentTime;
              this.port.postMessage({ type: "stats", queuedSamples: this.queuedSamples });
            }
            process(inputs, outputs) {
              const output = outputs[0][0];
              output.fill(0);
              if (this.prebuffering) {
                const ready = this.queuedSamples >= this.prebufferSamples || (!this.expectMore && this.queuedSamples > 0);
                if (!ready) {
                  this.postStats();
                  return true;
                }
                this.prebuffering = false;
                if (!this.started) {
                  this.started = true;
                  this.port.postMessage({ type: "event", kind: "audio_play_started" });
                }
              }
              let written = 0;
              while (written < output.length) {
                if (!this.current) {
                  if (this.queue.length === 0) break;
                  this.current = this.queue.shift();
                  this.offset = 0;
                }
                const count = Math.min(output.length - written, this.current.length - this.offset);
                output.set(this.current.subarray(this.offset, this.offset + count), written);
                this.offset += count;
                written += count;
                this.queuedSamples -= count;
                if (this.offset >= this.current.length) {
                  this.current = null;
                }
              }
              if (written < output.length && this.expectMore) {
                this.prebuffering = true;
                this.port.postMessage({ type: "event", kind: "underrun", missingSamples: output.length - written });
              }
              if (!this.expectMore && this.queuedSamples <= 0 && !this.current && this.started) {
                this.started = false;
                this.port.postMessage({ type: "event", kind: "audio_play_finished" });
              }
              this.postStats();
              return true;
            }
          }
          registerProcessor("pcm-player", PCMPlayerWorklet);
        `;
        const blob = new Blob([workletCode], { type: "application/javascript" });
        state.workletBlobUrl = URL.createObjectURL(blob);
        await state.audioCtx.audioWorklet.addModule(state.workletBlobUrl);
        state.worklet = new AudioWorkletNode(state.audioCtx, "pcm-player");
        state.worklet.port.onmessage = (event) => {
          const data = event.data || {};
          if (data.type === "stats") {
            recordQueueDepth(Number(data.queuedSamples || 0));
            return;
          }
          if (data.type === "event") {
            if (data.kind === "underrun") {
              playbackState.underruns += 1;
              log(`underrun_detected missing_samples=${data.missingSamples || 0}`);
            } else {
              log(data.kind);
            }
            renderDebugPanel();
          }
        };
        state.worklet.connect(state.gainNode);
      }

      if (state.audioCtx.state !== "running") {
        await state.audioCtx.resume();
      }
      renderDebugPanel();
    }

    function schedulePcmChunk(arrayBuffer) {
      if (!state.audioCtx || !state.worklet || !state.streamMeta) return;
      const bytes = new Uint8Array(arrayBuffer);
      const channels = Number(state.streamMeta.channels || 1);
      const frameSize = Math.max(1, channels) * 2;
      const alignedInput = concatUint8Arrays([
        playbackState.pendingPcmRemainder,
        bytes,
      ]);
      const alignedLength = alignedInput.length - (alignedInput.length % frameSize);
      const alignedBytes = alignedInput.subarray(0, alignedLength);
      playbackState.pendingPcmRemainder = alignedInput.slice(alignedLength);
      if (!alignedBytes.length) {
        log(`pcm_frame_buffered carry_bytes=${playbackState.pendingPcmRemainder.length}`);
        return;
      }
      const mono = pcm16ToMonoFloat32(
        alignedBytes.buffer.slice(
          alignedBytes.byteOffset,
          alignedBytes.byteOffset + alignedBytes.byteLength,
        ),
        channels,
      );
      const playable = resampleCubic(
        mono,
        Number(state.streamMeta.sample_rate || 44100),
        state.audioCtx.sampleRate,
      );
      state.worklet.port.postMessage({ type: "push", payload: playable });
      log(
        `audio_chunk_queued seq=${state.streamMeta.lastSeq || "-"} samples=${playable.length} ` +
        `sample_rate=${state.streamMeta.sample_rate} audio_ctx=${state.audioCtx.sampleRate} ` +
        `carry_bytes=${playbackState.pendingPcmRemainder.length}`,
      );
    }

    async function scheduleWavChunk(arrayBuffer) {
      if (!state.audioCtx || !state.worklet) return;
      const decoded = await state.audioCtx.decodeAudioData(arrayBuffer.slice(0));
      const mono = new Float32Array(decoded.length);
      for (let ch = 0; ch < decoded.numberOfChannels; ch += 1) {
        const data = decoded.getChannelData(ch);
        for (let i = 0; i < decoded.length; i += 1) {
          mono[i] += data[i] / decoded.numberOfChannels;
        }
      }
      state.worklet.port.postMessage({ type: "push", payload: mono });
    }

    function stopPlayback() {
      if (state.abortController) {
        state.abortController.abort();
        state.abortController = null;
      }
      if (state.worklet) {
        state.worklet.port.postMessage({ type: "reset" });
        state.worklet.port.postMessage({ type: "expect_more", value: false });
      }
      playbackState.queuedSamples = 0;
      playbackState.underruns = 0;
      playbackState.firstAudioAtMs = null;
      playbackState.pendingPcmRemainder = new Uint8Array(0);
      state.streamMeta = null;
      renderDebugPanel();
      setStateLabel("stopped");
      log("stopped");
    }

    async function play() {
      await ensureAudio();
      stopPlayback();

      const text = els.sourceText.value.trim();
      if (!text) {
        log("empty_text");
        return;
      }

      const finalText = /[.!?…]$/.test(text) ? text : `${text}.`;
      const url = `${els.proxyBaseUrl.value.trim()}/pcm-stream?text=${encodeURIComponent(finalText)}&_ts=${Date.now()}`;

      state.abortController = new AbortController();
      state.currentRunId += 1;
      const runId = state.currentRunId;
      playbackState.clickAtMs = performance.now();
      playbackState.firstAudioAtMs = null;

      setStateLabel("connecting");
      log(`request_start run=${runId}`);

      const response = await fetch(url, {
        method: "GET",
        cache: "no-store",
        signal: state.abortController.signal,
      });

      if (!response.ok || !response.body) {
        setStateLabel(`http_${response.status}`);
        log(`bad_response status=${response.status}`);
        return;
      }

      setStateLabel("streaming");
      log(`proxy_connected status=${response.status}`);

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let textBuffer = "";

      try {
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          textBuffer += decoder.decode(value, { stream: true });
          while (true) {
            const newline = textBuffer.indexOf("\n");
            if (newline === -1) break;
            const line = textBuffer.slice(0, newline).trim();
            textBuffer = textBuffer.slice(newline + 1);
            if (!line) continue;

            const event = JSON.parse(line);
            if (event.type === "meta") {
              state.streamMeta = { ...event, lastSeq: null };
              log(`meta sample_rate=${event.sample_rate} channels=${event.channels}`);
            } else if (event.type === "pcm") {
              if (!state.streamMeta) continue;
              state.streamMeta.lastSeq = event.seq ?? null;
              const bytes = Uint8Array.from(atob(event.data), ch => ch.charCodeAt(0));
              if (!playbackState.firstAudioAtMs) {
                playbackState.firstAudioAtMs = performance.now();
              }
              log(`audio_chunk_received seq=${event.seq ?? "-"} bytes=${bytes.byteLength}`);
              schedulePcmChunk(bytes.buffer);
              state.worklet.port.postMessage({ type: "expect_more", value: true });
            } else if (event.type === "done") {
              if (state.worklet) {
                state.worklet.port.postMessage({ type: "expect_more", value: false });
              }
              setStateLabel("done");
              log("stream_done");
            } else if (event.type === "error") {
              setStateLabel("error");
              log(`proxy_error ${event.message}`);
            }
          }
          renderDebugPanel();
        }
      } catch (error) {
        if (state.abortController?.signal.aborted) {
          log("request_aborted");
        } else {
          log(`read_error ${error.message || error}`);
        }
      } finally {
        state.abortController = null;
        renderDebugPanel();
      }
    }

    els.playBtn.addEventListener("click", () => {
      play().catch((error) => {
        log(`play_error ${error.message || error}`);
        setStateLabel("error");
      });
    });

    els.stopBtn.addEventListener("click", stopPlayback);

    renderDebugPanel();
    log("ready");
  </script>
</body>
</html>
