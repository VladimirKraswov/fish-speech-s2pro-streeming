<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>LLM Stateful TTS Emulator</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 24px;
      max-width: 1100px;
      line-height: 1.45;
    }
    textarea {
      width: 100%;
      min-height: 280px;
      font-size: 16px;
      padding: 12px;
      box-sizing: border-box;
    }
    input {
      padding: 6px 8px;
      margin: 4px;
    }
    button {
      padding: 10px 14px;
      margin: 4px;
      cursor: pointer;
    }
    pre {
      background: #111;
      color: #eee;
      padding: 12px;
      max-height: 280px;
      overflow: auto;
      white-space: pre-wrap;
    }
    .row {
      margin: 10px 0;
    }
    label {
      display: inline-block;
      min-width: 180px;
    }
    .ok { color: green; }
    .bad { color: darkred; }
  </style>
</head>
<body>
  <h1>LLM Stateful TTS Emulator</h1>

  <div class="row">
    <label>Proxy base URL</label>
    <input id="proxyBase" value="http://127.0.0.1:9000" size="32" />
  </div>

  <div class="row">
    <label>Reference ID</label>
    <input id="referenceId" value="voice" size="20" />

    <label>LLM chunk chars</label>
    <input id="chunkChars" value="18" type="number" min="1" max="200" />

    <label>Delay ms</label>
    <input id="delayMs" value="35" type="number" min="0" max="2000" />
  </div>

  <div class="row">
    <label>Initial playback buffer ms</label>
    <input id="initialPlaybackBufferMs" value="450" type="number" min="0" max="5000" />

    <label>Gain</label>
    <input id="gainValue" value="1.0" type="number" min="0" max="3" step="0.05" />
  </div>

  <textarea id="textInput" placeholder="Вставь сюда длинный текст, который нужно эмулировать как LLM output..."></textarea>

  <div class="row">
    <button id="startBtn">Start stateful stream</button>
    <button id="finishBtn">Finish</button>
    <button id="closeBtn">Close session</button>
    <button id="stopAudioBtn">Stop audio</button>
  </div>

  <p id="status">Idle</p>

  <h3>Emitted text</h3>
  <pre id="emitted"></pre>

  <h3>Log</h3>
  <pre id="log"></pre>

<script>
let sessionId = null;
let streamAbort = null;
let emitAbort = false;

let audioCtx = null;
let gainNode = null;
let nextStartTime = 0;
let audioMeta = null;
let startedAudio = false;

function $(id) {
  return document.getElementById(id);
}

function log(...args) {
  const line = args.map(x => {
    if (typeof x === "string") return x;
    try { return JSON.stringify(x); } catch { return String(x); }
  }).join(" ");
  $("log").textContent += line + "\n";
  $("log").scrollTop = $("log").scrollHeight;
}

function setStatus(text, ok = null) {
  const el = $("status");
  el.textContent = text;
  el.className = ok === true ? "ok" : ok === false ? "bad" : "";
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function normalizeBase(url) {
  return url.replace(/\/+$/, "");
}

function makeConfig(referenceId) {
  return {
    commit: {
      first: {
        min_chars: 40,
        target_chars: 58,
        max_chars: 84,
        max_wait_ms: 150,
        allow_partial_after_ms: 240
      },
      next: {
        min_chars: 100,
        target_chars: 140,
        max_chars: 210,
        max_wait_ms: 300,
        allow_partial_after_ms: 520
      },
      flush_on_sentence_punctuation: true,
      flush_on_clause_punctuation: true,
      flush_on_newline: true,
      carry_incomplete_tail: true
    },
    tts: {
      reference_id: referenceId,
      format: "wav",
      normalize: true,
      use_memory_cache: "on",
      seed: 1234,
      max_new_tokens: 160,
      chunk_length: 160,
      top_p: 0.78,
      repetition_penalty: 1.12,
      temperature: 0.7,
      stream_tokens: true,
      initial_stream_chunk_size: 10,
      stream_chunk_size: 8,
      stateful_synthesis: true,
      stateful_fallback_to_stateless: false
    },
    playback: {
      target_emit_bytes: 8192,
      start_buffer_ms: 180,
      stop_grace_ms: 20
    },
    session: {
      max_buffer_chars: 8000,
      auto_close_on_finish: false
    }
  };
}

function splitLikeLLM(text, targetChars) {
  const parts = text.match(/\S+\s*/g) || [];
  const chunks = [];

  let cur = "";
  for (const part of parts) {
    if ((cur + part).length >= targetChars && cur.length > 0) {
      chunks.push(cur);
      cur = "";
    }

    if (part.length > targetChars * 2) {
      let i = 0;
      while (i < part.length) {
        chunks.push(part.slice(i, i + targetChars));
        i += targetChars;
      }
    } else {
      cur += part;
    }
  }

  if (cur) chunks.push(cur);
  return chunks;
}

async function openSession() {
  const proxyBase = normalizeBase($("proxyBase").value);
  const referenceId = $("referenceId").value.trim() || "voice";
  const config = makeConfig(referenceId);

  const resp = await fetch(`${proxyBase}/session/open`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      config_text: JSON.stringify(config)
    })
  });

  const data = await resp.json();

  if (!resp.ok || !data.ok) {
    throw new Error(`session/open failed: ${JSON.stringify(data)}`);
  }

  sessionId = data.session_id;

  if (!data.config?.tts?.stateful_synthesis) {
    throw new Error("Proxy session opened without stateful_synthesis=true");
  }

  log("session opened:", data);
  setStatus(`Session opened: ${sessionId}`, true);

  return sessionId;
}

async function appendText(text) {
  const proxyBase = normalizeBase($("proxyBase").value);

  const resp = await fetch(`${proxyBase}/session/${sessionId}/append`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text })
  });

  const data = await resp.json();

  if (!resp.ok || !data.ok) {
    throw new Error(`append failed: ${JSON.stringify(data)}`);
  }

  if (data.committed?.length) {
    for (const c of data.committed) {
      log(`commit queued seq=${c.seq} reason=${c.reason} chars=${c.text.length}`);
    }
  }

  return data;
}

async function finishSession() {
  if (!sessionId) return;

  const proxyBase = normalizeBase($("proxyBase").value);

  const resp = await fetch(`${proxyBase}/session/${sessionId}/finish`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ reason: "llm_emulator_finished" })
  });

  const data = await resp.json();
  log("finish:", data);
}

async function closeSession() {
  if (!sessionId) return;

  const proxyBase = normalizeBase($("proxyBase").value);

  try {
    await fetch(`${proxyBase}/session/close`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id: sessionId })
    });
  } finally {
    sessionId = null;
    setStatus("Session closed", true);
  }
}

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new AudioContext();
    gainNode = audioCtx.createGain();
    gainNode.gain.value = Number($("gainValue").value || 1);
    gainNode.connect(audioCtx.destination);
  }

  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }
}

function base64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) {
    bytes[i] = bin.charCodeAt(i);
  }
  return bytes;
}

function schedulePcm(b64) {
  ensureAudio();

  if (!audioMeta) {
    log("pcm received before meta; skip");
    return;
  }

  const bytes = base64ToBytes(b64);
  const channels = audioMeta.channels || 1;
  const sampleRate = audioMeta.sample_rate || 44100;
  const sampleWidth = audioMeta.sample_width || 2;

  if (sampleWidth !== 2) {
    throw new Error(`Unsupported sample_width=${sampleWidth}`);
  }

  const frameCount = Math.floor(bytes.length / (channels * sampleWidth));
  if (frameCount <= 0) return;

  const view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
  const buffer = audioCtx.createBuffer(channels, frameCount, sampleRate);

  for (let frame = 0; frame < frameCount; frame++) {
    for (let ch = 0; ch < channels; ch++) {
      const idx = (frame * channels + ch) * 2;
      const s = view.getInt16(idx, true) / 32768;
      buffer.getChannelData(ch)[frame] = s;
    }
  }

  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  src.connect(gainNode);

  const now = audioCtx.currentTime;
  const initialDelaySec = Number($("initialPlaybackBufferMs").value || 0) / 1000;

  if (!startedAudio) {
    nextStartTime = now + initialDelaySec;
    startedAudio = true;
  }

  if (nextStartTime < now + 0.01) {
    log(`audio underrun: nextStartTime=${nextStartTime.toFixed(3)} now=${now.toFixed(3)}`);
    nextStartTime = now + 0.02;
  }

  src.start(nextStartTime);
  nextStartTime += buffer.duration;
}

async function startPcmStream() {
  const proxyBase = normalizeBase($("proxyBase").value);

  streamAbort = new AbortController();

  const resp = await fetch(`${proxyBase}/session/${sessionId}/pcm-stream`, {
    signal: streamAbort.signal
  });

  if (!resp.ok) {
    const text = await resp.text();
    throw new Error(`pcm-stream failed: ${resp.status} ${text}`);
  }

  log("pcm-stream opened");

  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buf = "";

  while (true) {
    const { value, done } = await reader.read();

    if (done) {
      log("pcm-stream done");
      break;
    }

    buf += decoder.decode(value, { stream: true });

    while (true) {
      const nl = buf.indexOf("\n");
      if (nl < 0) break;

      const line = buf.slice(0, nl).trim();
      buf = buf.slice(nl + 1);

      if (!line) continue;

      let evt;
      try {
        evt = JSON.parse(line);
      } catch {
        log("bad ndjson:", line);
        continue;
      }

      handleStreamEvent(evt);
    }
  }
}

function handleStreamEvent(evt) {
  switch (evt.type) {
    case "session_start":
      log("stream session_start:", evt);
      break;

    case "meta":
      audioMeta = evt;
      log("audio meta:", evt);
      break;

    case "commit_start":
      log(`commit_start seq=${evt.commit_seq} chars=${evt.text?.length || 0}`);
      break;

    case "pcm":
      schedulePcm(evt.data);
      break;

    case "commit_done":
      log(`commit_done seq=${evt.commit_seq} upstream_bytes=${evt.upstream_bytes}`);
      break;

    case "session_done":
      log("session_done:", evt);
      setStatus("Done", true);
      break;

    case "error":
      log("stream error:", evt);
      setStatus(evt.message || "Stream error", false);
      break;

    default:
      log("event:", evt);
      break;
  }
}

async function startEmulation() {
  emitAbort = false;
  audioMeta = null;
  startedAudio = false;
  nextStartTime = 0;
  $("emitted").textContent = "";
  $("log").textContent = "";

  const text = $("textInput").value;
  if (!text.trim()) {
    alert("Вставь текст.");
    return;
  }

  const chunkChars = Number($("chunkChars").value || 18);
  const delayMs = Number($("delayMs").value || 35);

  setStatus("Opening stateful session...");
  await openSession();

  setStatus("Opening PCM stream...");
  const streamPromise = startPcmStream().catch(err => {
    log("stream exception:", err.message || err);
    setStatus(String(err.message || err), false);
  });

  await sleep(150);

  setStatus("Emitting text chunks...", true);

  const chunks = splitLikeLLM(text, chunkChars);
  log(`LLM chunks: ${chunks.length}`);

  for (const chunk of chunks) {
    if (emitAbort) {
      log("emission aborted");
      break;
    }

    await appendText(chunk);
    $("emitted").textContent += chunk;
    $("emitted").scrollTop = $("emitted").scrollHeight;

    if (delayMs > 0) {
      await sleep(delayMs);
    }
  }

  if (!emitAbort) {
    setStatus("Finishing input...");
    await finishSession();
  }

  await streamPromise;
}

$("startBtn").onclick = async () => {
  try {
    ensureAudio();
    await startEmulation();
  } catch (err) {
    console.error(err);
    log("fatal:", err.message || err);
    setStatus(String(err.message || err), false);
  }
};

$("finishBtn").onclick = async () => {
  emitAbort = true;
  await finishSession();
};

$("closeBtn").onclick = async () => {
  emitAbort = true;
  if (streamAbort) streamAbort.abort();
  await closeSession();
};

$("stopAudioBtn").onclick = async () => {
  if (audioCtx) {
    await audioCtx.close();
  }
  audioCtx = null;
  gainNode = null;
  nextStartTime = 0;
  startedAudio = false;
  log("audio stopped");
};
</script>
</body>
</html>
